name: Dispatch Workflow on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to dispatch with"
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch workflow in smoothcsv/smoothcsv
        env:
          TARGET_REPO: smoothcsv/smoothcsv
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          PAT: ${{ secrets.SMOOTHCSV_WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TAG" ]; then
            echo "No tag provided" >&2; exit 1
          fi
          if [ -z "$PAT" ]; then
            echo "SMOOTHCSV_WEBSITE_DISPATCH_TOKEN secret is not set" >&2; exit 1
          fi
          payload=$(jq -nc --arg tag "$TAG" '{event_type: "smoothcsv3-release", client_payload: {tag: $tag}}')
          response=$(mktemp)
          http_code=$(curl -sS -o "$response" -w '%{http_code}' -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $PAT" \
            -H 'Content-Type: application/json' \
            "https://api.github.com/repos/$TARGET_REPO/dispatches" \
            -d "$payload")
          echo "HTTP $http_code"
          cat "$response"
          if [ "$http_code" != "204" ]; then
            echo "Dispatch failed (expected 204)" >&2
            exit 1
          fi
